<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: "class"
        }
    </script>
</head>

<body class="bg-gray-100">
    <div id="loader"
     class="fixed inset-0 bg-white flex flex-col items-center justify-center z-50">

    <div class="w-16 h-16 border-4 border-blue-700 border-t-transparent rounded-full animate-spin"></div>

    <p class="mt-4 text-blue-700 font-bold text-xl">
        Loading...
    </p>

</div>

<div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-64 bg-blue-900 text-white hidden md:block">

        <div class="text-center text-2xl font-bold py-6 border-b border-blue-700">
            Intern Portal
        </div>

        <nav class="mt-6">

            <a href="dashboard.html" class="block px-6 py-3 hover:bg-blue-700">🏠 Dashboard</a>

            <a href="students.html" class="block px-6 py-3 hover:bg-blue-700">👨‍🎓 Students</a>

            <a href="register.html" class="block px-6 py-3 bg-blue-700">📝 Registration</a>

            <a href="attendance.html" class="block px-6 py-3 hover:bg-blue-700">📅 Attendance</a>

            <a href="reports.html" class="block px-6 py-3 hover:bg-blue-700">📈 Reports</a>

            <a href="settings.html" class="block px-6 py-3 hover:bg-blue-700">⚙️ Settings</a>

        </nav>

    </aside>

    <!-- Main -->
    <main class="flex-1 p-8">

        <h1 class="text-4xl font-bold text-blue-900 mb-8">
            Student Registration Form
        </h1>

        <form id="studentForm" class="bg-white shadow-lg rounded-xl p-8">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                <input type="text" id="studentName" placeholder="First Name" class="border p-3 rounded-lg">

                <input type="text" placeholder="Last Name" class="border p-3 rounded-lg">

                <input type="email" id="studentEmail" placeholder="Email" class="border p-3 rounded-lg">

                <input type="tel" placeholder="Phone Number" class="border p-3 rounded-lg">

                <input type="date" class="border p-3 rounded-lg">

                <select id="studentGender" class="border p-3 rounded-lg">
    <option>Select Gender</option>
    <option>Male</option>
    <option>Female</option>
</select>

<input type="text" placeholder="College Name" class="border p-3 rounded-lg">

<input type="text" placeholder="University" class="border p-3 rounded-lg">

<select id="studentCourse" class="border p-3 rounded-lg">
    <option>Select Course</option>
    <option>BCA</option>
    <option>MCA</option>
    <option>B.Tech</option>
</select>

                <input type="text" placeholder="Department" class="border p-3 rounded-lg">

                <input type="number" placeholder="Roll Number" class="border p-3 rounded-lg">

                <input type="number" placeholder="Semester" class="border p-3 rounded-lg">

                <input type="text" placeholder="Father's Name" class="border p-3 rounded-lg">

                <input type="text" placeholder="Mother's Name" class="border p-3 rounded-lg">

                <input type="text" placeholder="Emergency Contact" class="border p-3 rounded-lg">

                <input type="text" placeholder="City" class="border p-3 rounded-lg">

                <input type="text" placeholder="State" class="border p-3 rounded-lg">

                <input type="number" placeholder="PIN Code" class="border p-3 rounded-lg">

                <input type="file" class="border p-3 rounded-lg">

                <input type="text" placeholder="Skills" class="border p-3 rounded-lg">

            </div>

            <textarea placeholder="Full Address"
                class="border p-3 rounded-lg w-full mt-6 h-32"></textarea>

            <div class="flex gap-4 mt-8">

                <button type="submit"
    class="bg-blue-700 text-white px-8 py-3 rounded-lg hover:bg-blue-900">
    Register Student
</button>

                <button type="reset"
                    class="bg-red-500 text-white px-8 py-3 rounded-lg hover:bg-red-700">
                    Reset
                </button>

            </div>

        </form>

    </main>

</div>
<script src="js/app.js"></script>
<script src="js/validation.js"></script>
<script src="js/students.js"></script>
</body>
</html>
