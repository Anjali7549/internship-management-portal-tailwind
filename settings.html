<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
    darkMode: 'class'
}

function toggleDarkMode() {
    document.documentElement.classList.toggle("dark");
}
</script>

</head>

<body class="bg-gray-100 dark:bg-gray-900 dark:text-white">

<div class="flex min-h-screen">

<!-- Sidebar -->

<aside class="w-64 bg-blue-900 text-white hidden md:block">

<div class="text-center text-2xl font-bold py-6 border-b border-blue-700">
Intern Portal
</div>

<nav class="mt-6">

<a href="dashboard.html" class="block px-6 py-3 hover:bg-blue-700">🏠 Dashboard</a>

<a href="students.html" class="block px-6 py-3 hover:bg-blue-700">👨‍🎓 Students</a>

<a href="register.html" class="block px-6 py-3 hover:bg-blue-700">📝 Registration</a>

<a href="attendance.html" class="block px-6 py-3 hover:bg-blue-700">📅 Attendance</a>

<a href="tasks.html" class="block px-6 py-3 hover:bg-blue-700">📚 Tasks</a>

<a href="reports.html" class="block px-6 py-3 hover:bg-blue-700">📊 Reports</a>

<a href="certificates.html" class="block px-6 py-3 hover:bg-blue-700">🏆 Certificates</a>

<a href="settings.html" class="block px-6 py-3 bg-blue-700">⚙ Settings</a>

</nav>

</aside>

<!-- Main -->

<main class="flex-1 p-8">

<h1 class="text-4xl font-bold text-blue-900 dark:text-white mb-8">
Settings
</h1>

<div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-8">

<h2 class="text-2xl font-bold mb-6">
Profile Settings
</h2>

<div class="grid md:grid-cols-2 gap-6">

<input
type="text"
placeholder="Full Name"
class="border rounded-lg p-3 dark:bg-gray-700">

<input
type="email"
placeholder="Email"
class="border rounded-lg p-3 dark:bg-gray-700">

<input
type="tel"
placeholder="Phone Number"
class="border rounded-lg p-3 dark:bg-gray-700">

<input
type="text"
placeholder="College"
class="border rounded-lg p-3 dark:bg-gray-700">

</div>

<h2 class="text-2xl font-bold mt-10 mb-6">
Change Password
</h2>

<div class="grid md:grid-cols-2 gap-6">

<input
type="password"
placeholder="Current Password"
class="border rounded-lg p-3 dark:bg-gray-700">

<input
type="password"
placeholder="New Password"
class="border rounded-lg p-3 dark:bg-gray-700">

</div>

<h2 class="text-2xl font-bold mt-10 mb-6">
Notification Settings
</h2>

<div class="space-y-4">

<label class="flex items-center gap-3">
<input type="checkbox" checked>
Email Notifications
</label>

<label class="flex items-center gap-3">
<input type="checkbox" checked>
SMS Notifications
</label>

<label class="flex items-center gap-3">
<input type="checkbox">
Assignment Alerts
</label>

</div>

<h2 class="text-2xl font-bold mt-10 mb-6">
Appearance
</h2>

<button
onclick="toggleDarkMode()"
class="bg-black text-white px-6 py-3 rounded-lg">

🌙 Toggle Dark Mode

</button>

<div class="mt-10">

<button
class="bg-blue-700 text-white px-8 py-3 rounded-lg hover:bg-blue-900">

Save Settings

</button>

</div>

</div>

</main>

</div>

</body>
</html>
